name: Cypress Tests (Triggered by Admin)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test to run'
        required: true
        type: string
      run_id:
        description: 'test_runs UUID from Supabase'
        required: true
        type: string
      base_url:
        description: 'Base URL to test'
        required: true
        type: string
      supabase_url:
        description: 'Supabase project URL'
        required: true
        type: string
      supabase_key:
        description: 'Supabase service role key'
        required: true
        type: string
      ingest_token:
        description: 'Ephemeral token for event ingestion'
        required: false
        type: string

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Expose env vars at job level so setupNodeEvents (process.env) can read them
    env:
      SUPABASE_URL: ${{ github.event.inputs.supabase_url }}
      SUPABASE_KEY: ${{ github.event.inputs.supabase_key }}
      RUN_ID: ${{ github.event.inputs.run_id }}
      INGEST_TOKEN: ${{ github.event.inputs.ingest_token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Map test_type to Cypress spec
        id: specs
        run: |
          case "${{ github.event.inputs.test_type }}" in
            frontend)     SPEC="cypress/e2e/smoke/**" ;;
            business)     SPEC="cypress/e2e/calculo-planos.cy.ts" ;;
            forms)        SPEC="cypress/e2e/formulario-contratacao.cy.ts" ;;
            contracts)    SPEC="cypress/e2e/contratos/**" ;;
            checkout)     SPEC="cypress/e2e/checkout/**" ;;
            portal)       SPEC="cypress/e2e/smoke/home.cy.ts" ;;
            regression)   SPEC="cypress/e2e/**" ;;
            *)            SPEC="cypress/e2e/smoke/**" ;;
          esac
          echo "spec=$SPEC" >> $GITHUB_OUTPUT

      - name: Update status to running in Supabase
        run: |
          curl -s -X PATCH \
            "${{ github.event.inputs.supabase_url }}/rest/v1/test_runs?id=eq.${{ github.event.inputs.run_id }}" \
            -H "apikey: ${{ github.event.inputs.supabase_key }}" \
            -H "Authorization: Bearer ${{ github.event.inputs.supabase_key }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{
              "github_run_id": "${{ github.run_id }}",
              "github_run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "current_spec": "Instalando dependências...",
              "progress_percent": 0,
              "logs": {
                "entries": [{"ts": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'", "event": "github_started", "detail": "GitHub Actions workflow iniciado"}],
                "current_spec": "Instalando dependências...",
                "current_url": null
              }
            }'

      - name: Run Cypress
        id: cypress
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          browser: chrome
          headed: false
          spec: ${{ steps.specs.outputs.spec }}
          config: baseUrl=${{ github.event.inputs.base_url }}

      - name: Merge mochawesome reports
        if: always()
        run: |
          npx mochawesome-merge "cypress/results/*.json" > cypress/results/merged-report.json 2>/dev/null || echo '{"stats":{},"results":[]}' > cypress/results/merged-report.json

      - name: Upload artifacts and finalize
        if: always()
        run: |
          SUPABASE_URL="${{ github.event.inputs.supabase_url }}"
          SUPABASE_KEY="${{ github.event.inputs.supabase_key }}"
          RUN_ID="${{ github.event.inputs.run_id }}"
          INGEST_TOKEN="${{ github.event.inputs.ingest_token }}"

          # Upload screenshots to Supabase Storage
          SCREENSHOT_URLS="[]"
          if [ -d "cypress/screenshots" ]; then
            find cypress/screenshots -name "*.png" | while read -r file; do
              RELATIVE_PATH="${file#cypress/screenshots/}"
              STORAGE_PATH="runs/$RUN_ID/screenshots/$RELATIVE_PATH"
              curl -s -X POST \
                "$SUPABASE_URL/storage/v1/object/test-artifacts/$STORAGE_PATH" \
                -H "apikey: $SUPABASE_KEY" \
                -H "Authorization: Bearer $SUPABASE_KEY" \
                -H "Content-Type: image/png" \
                --data-binary "@$file" > /dev/null
            done
            SCREENSHOT_URLS=$(find cypress/screenshots -name "*.png" | while read -r file; do
              RELATIVE_PATH="${file#cypress/screenshots/}"
              echo "\"$SUPABASE_URL/storage/v1/object/public/test-artifacts/runs/$RUN_ID/screenshots/$RELATIVE_PATH\""
            done | paste -sd, | sed 's/^/[/' | sed 's/$/]/')
            [ -z "$SCREENSHOT_URLS" ] && SCREENSHOT_URLS="[]"
          fi

          # Upload videos to Supabase Storage
          VIDEO_URLS="[]"
          if [ -d "cypress/videos" ]; then
            find cypress/videos -name "*.mp4" | while read -r file; do
              RELATIVE_PATH="${file#cypress/videos/}"
              STORAGE_PATH="runs/$RUN_ID/videos/$RELATIVE_PATH"
              curl -s -X POST \
                "$SUPABASE_URL/storage/v1/object/test-artifacts/$STORAGE_PATH" \
                -H "apikey: $SUPABASE_KEY" \
                -H "Authorization: Bearer $SUPABASE_KEY" \
                -H "Content-Type: video/mp4" \
                --data-binary "@$file" > /dev/null
            done
            VIDEO_URLS=$(find cypress/videos -name "*.mp4" | while read -r file; do
              RELATIVE_PATH="${file#cypress/videos/}"
              echo "\"$SUPABASE_URL/storage/v1/object/public/test-artifacts/runs/$RUN_ID/videos/$RELATIVE_PATH\""
            done | paste -sd, | sed 's/^/[/' | sed 's/$/]/')
            [ -z "$VIDEO_URLS" ] && VIDEO_URLS="[]"
          fi

          # Update run with artifact URLs (after:run already finalized status/counters)
          curl -s -X PATCH \
            "$SUPABASE_URL/rest/v1/test_runs?id=eq.$RUN_ID" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"screenshot_urls\": $SCREENSHOT_URLS,
              \"video_urls\": $VIDEO_URLS,
              \"github_run_id\": \"${{ github.run_id }}\",
              \"github_run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"browser\": \"chrome\"
            }"

      - name: Upload screenshots (GitHub artifact backup)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ github.event.inputs.test_type }}
          path: cypress/screenshots
          retention-days: 14

      - name: Upload videos (GitHub artifact backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ github.event.inputs.test_type }}
          path: cypress/videos
          retention-days: 14
