name: Cypress Tests (Triggered by Admin)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test to run'
        required: true
        type: string
      run_id:
        description: 'test_runs UUID from Supabase'
        required: true
        type: string
      base_url:
        description: 'Base URL to test'
        required: true
        type: string
      supabase_url:
        description: 'Supabase project URL'
        required: true
        type: string
      supabase_key:
        description: 'Supabase service role key'
        required: true
        type: string
      ingest_token:
        description: 'Ephemeral token for event ingestion'
        required: false
        type: string
      admin_password:
        description: 'Admin password for authenticated tests'
        required: false
        type: string

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ github.event.inputs.supabase_url }}
      SUPABASE_KEY: ${{ github.event.inputs.supabase_key }}
      RUN_ID: ${{ github.event.inputs.run_id }}
      INGEST_TOKEN: ${{ github.event.inputs.ingest_token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify runner online (early)
        run: |
          INGEST_URL="${{ github.event.inputs.supabase_url }}/functions/v1/ingest-test-events"
          if [ -n "${{ github.event.inputs.ingest_token }}" ]; then
            curl -sf -X POST "$INGEST_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"run_id\": \"${{ github.event.inputs.run_id }}\",
                \"token\": \"${{ github.event.inputs.ingest_token }}\",
                \"events\": [{
                  \"event_type\": \"runner_online\",
                  \"status\": \"running\",
                  \"payload\": {
                    \"github_run_id\": \"${{ github.run_id }}\",
                    \"runner\": \"ubuntu-latest\"
                  }
                }]
              }" && echo "Ingest: runner_online sent" || echo "Ingest: runner_online failed (non-fatal)"
          fi
          curl -sf -X PATCH \
            "${{ github.event.inputs.supabase_url }}/rest/v1/test_runs?id=eq.${{ github.event.inputs.run_id }}" \
            -H "apikey: ${{ github.event.inputs.supabase_key }}" \
            -H "Authorization: Bearer ${{ github.event.inputs.supabase_key }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"github_run_id\": \"${{ github.run_id }}\",
              \"github_run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"current_spec\": \"Runner online, preparando ambiente...\",
              \"progress_percent\": 5
            }" && echo "REST: runner status updated" || echo "REST: runner status update failed"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Cypress binary
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-bin-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-bin-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress binary
        run: npx cypress verify

      - name: Prepare directories & map specs
        id: specs
        run: |
          mkdir -p cypress/results cypress/screenshots cypress/videos
            case "${{ github.event.inputs.test_type }}" in
              frontend)     SPEC="cypress/e2e/smoke/**" ;;
              business)     SPEC="cypress/e2e/calculo-planos.cy.ts,cypress/e2e/formulario-contratacao.cy.ts,cypress/e2e/geracao-contrato.cy.ts,cypress/e2e/checkout-completo.cy.ts,cypress/e2e/administracao-servidores.cy.ts" ;;
              forms)        SPEC="cypress/e2e/formulario-contratacao.cy.ts" ;;
              contracts)    SPEC="cypress/e2e/contratos/**" ;;
              checkout)     SPEC="cypress/e2e/checkout/**" ;;
              portal)       SPEC="cypress/e2e/smoke/area-cliente.cy.ts,cypress/e2e/smoke/home.cy.ts" ;;
              certificate)  SPEC="cypress/e2e/certificate/**" ;;
              regression)   SPEC="cypress/e2e/**" ;;
              *)            SPEC="cypress/e2e/smoke/**" ;;
          esac
          echo "spec=$SPEC" >> $GITHUB_OUTPUT

      - name: Run Cypress
        id: cypress
        uses: cypress-io/github-action@v6
        continue-on-error: true
        env:
          CYPRESS_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || github.event.inputs.admin_password }}
        with:
          install: false
          browser: chrome
          headed: false
          spec: ${{ steps.specs.outputs.spec }}
          config: baseUrl=${{ github.event.inputs.base_url }}
          publish-summary: false

      - name: Finalize run from mochawesome report
        if: always()
        run: |
          set +e
          SUPABASE_URL="${{ github.event.inputs.supabase_url }}"
          SUPABASE_KEY="${{ github.event.inputs.supabase_key }}"
          RUN_ID="${{ github.event.inputs.run_id }}"
          INGEST_TOKEN="${{ github.event.inputs.ingest_token }}"
          INGEST_URL="$SUPABASE_URL/functions/v1/ingest-test-events"
          CYPRESS_EXIT="${{ steps.cypress.outcome }}"

          echo "=== FINALIZATION START ==="
          echo "Cypress outcome: $CYPRESS_EXIT"

          # ── Validate & merge mochawesome reports ──
          MERGED_REPORT="cypress/results/merged-report.json"
          rm -f "$MERGED_REPORT"

          VALID_FILES=""
          INVALID_COUNT=0
          VALID_COUNT=0

          if ls cypress/results/mochawesome*.json >/dev/null 2>&1; then
            for f in cypress/results/mochawesome*.json; do
              FSIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo "0")
              if [ "$FSIZE" -lt 10 ]; then
                echo "SKIP (empty/tiny ${FSIZE}b): $f"
                INVALID_COUNT=$((INVALID_COUNT + 1))
                continue
              fi
              if node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
                VALID_FILES="$VALID_FILES $f"
                VALID_COUNT=$((VALID_COUNT + 1))
                echo "OK (${FSIZE}b): $f"
              else
                echo "SKIP (invalid JSON): $f"
                INVALID_COUNT=$((INVALID_COUNT + 1))
              fi
            done
          fi

          echo "Report files: valid=$VALID_COUNT invalid=$INVALID_COUNT"

          if [ "$VALID_COUNT" -gt 0 ]; then
            npx mochawesome-merge $VALID_FILES > "$MERGED_REPORT" 2>/dev/null
            if [ $? -ne 0 ] || [ ! -s "$MERGED_REPORT" ]; then
              echo "Merge failed, using first valid file"
              cp $(echo $VALID_FILES | awk '{print $1}') "$MERGED_REPORT" 2>/dev/null
            fi
            echo "Mochawesome reports merged successfully"
          else
            echo '{"stats":{"tests":0,"passes":0,"failures":0,"pending":0,"duration":0},"results":[]}' > "$MERGED_REPORT"
            echo "No valid mochawesome reports found, using empty"
          fi

          # Parse stats from merged report
          TOTAL=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.tests||0)" 2>/dev/null || echo "0")
          PASSED=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.passes||0)" 2>/dev/null || echo "0")
          FAILED=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.failures||0)" 2>/dev/null || echo "0")
          SKIPPED=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.pending||0)" 2>/dev/null || echo "0")
          DURATION=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.duration||0)" 2>/dev/null || echo "0")

          echo "Stats: total=$TOTAL passed=$PASSED failed=$FAILED skipped=$SKIPPED duration=${DURATION}ms"

          # Determine final status
          if [ "$FAILED" -gt 0 ] 2>/dev/null; then
            FINAL_STATUS="failed"
          elif [ "$CYPRESS_EXIT" = "failure" ]; then
            FINAL_STATUS="failed"
            [ "$TOTAL" -eq 0 ] && FAILED=1 && TOTAL=1
          else
            FINAL_STATUS="success"
          fi

          # Extract error summary AND per-test results from mochawesome
          ERROR_SUMMARY=""
          TEST_RESULTS_JSON="[]"
          
          node -e "
            const fs = require('fs');
            const r = require('./$MERGED_REPORT');
            const errors = [];
            const results = [];
            
            (r.results || []).forEach(specFile => {
              const specName = specFile.file || specFile.fullFile || 'unknown';
              
              function walkSuites(suites, parentTitle) {
                (suites || []).forEach(suite => {
                  const suiteTitle = parentTitle ? parentTitle + ' > ' + suite.title : suite.title;
                  
                  (suite.tests || []).forEach(test => {
                    const entry = {
                      name: test.title || 'unnamed',
                      fullTitle: test.fullTitle || suiteTitle + ' > ' + test.title,
                      spec: specName,
                      status: test.pass ? 'passed' : test.fail ? 'failed' : 'skipped',
                      duration_ms: test.duration || 0,
                      url: test.context ? (typeof test.context === 'string' ? test.context : null) : null,
                    };
                    
                    if (test.fail && test.err) {
                      entry.error = (test.err.message || '').substring(0, 2000);
                      entry.stack_trace = (test.err.estack || test.err.stack || '').substring(0, 3000);
                      if (test.err.expected !== undefined || test.err.actual !== undefined) {
                        entry.diff = {
                          expected: test.err.expected,
                          actual: test.err.actual
                        };
                      }
                      errors.push(test.fullTitle + ': ' + (test.err.message || '').substring(0, 200));
                    }
                    
                    results.push(entry);
                  });
                  
                  // Recurse nested suites
                  walkSuites(suite.suites, suiteTitle);
                });
              }
              
              walkSuites(specFile.suites, '');
            });
            
            const errorSummary = errors.join(' | ').substring(0, 1000) || (r.stats?.failures > 0 ? r.stats.failures + ' test(s) failed' : '');
            
            fs.writeFileSync('/tmp/test_results.json', JSON.stringify(results));
            fs.writeFileSync('/tmp/error_summary.txt', errorSummary);
          " 2>/dev/null
          
          if [ -f /tmp/error_summary.txt ]; then
            ERROR_SUMMARY=$(cat /tmp/error_summary.txt)
          fi
          if [ -f /tmp/test_results.json ]; then
            TEST_RESULTS_JSON=$(cat /tmp/test_results.json)
          fi
          [ -z "$ERROR_SUMMARY" ] && [ "$FAILED" -gt 0 ] && ERROR_SUMMARY="$FAILED test(s) failed"

          echo "Final status: $FINAL_STATUS"
          echo "Error summary: $ERROR_SUMMARY"

          # Upload screenshots with sanitized filenames
          SCREENSHOT_URLS="[]"
          SCREENSHOT_MAP_JSON="[]"
          if [ -d "cypress/screenshots" ] && [ "$(find cypress/screenshots -name '*.png' 2>/dev/null | wc -l)" -gt 0 ]; then
            UPLOAD_OK=0
            UPLOAD_FAIL=0
            
            node -e "
              const fs = require('fs');
              const path = require('path');
              const { execSync } = require('child_process');
              
              const SUPABASE_URL = process.env.SUPABASE_URL;
              const SUPABASE_KEY = process.env.SUPABASE_KEY;
              const RUN_ID = process.env.RUN_ID;
              
              function sanitize(name) {
                return name
                  .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                  .replace(/[^a-zA-Z0-9._-]/g, '_')
                  .replace(/_+/g, '_')
                  .replace(/^_|_$/g, '')
                  .substring(0, 200);
              }
              
              function findFiles(dir, ext) {
                const results = [];
                if (!fs.existsSync(dir)) return results;
                for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                  const full = path.join(dir, entry.name);
                  if (entry.isDirectory()) results.push(...findFiles(full, ext));
                  else if (entry.name.endsWith(ext)) results.push(full);
                }
                return results;
              }
              
              const screenshots = findFiles('cypress/screenshots', '.png');
              const urls = [];
              const mapEntries = [];
              
              for (const file of screenshots) {
                const rel = path.relative('cypress/screenshots', file);
                const parts = rel.split(path.sep);
                const specSlug = sanitize(parts.length > 1 ? parts[0].replace('.cy.ts','').replace('.cy.js','') : 'unknown');
                const fileSlug = sanitize(path.basename(file, '.png'));
                const storagePath = 'runs/' + RUN_ID + '/screenshots/' + specSlug + '/' + fileSlug + '.png';
                
                try {
                  execSync(
                    'curl -sf -X POST \"' + SUPABASE_URL + '/storage/v1/object/test-artifacts/' + storagePath + '\" ' +
                    '-H \"apikey: ' + SUPABASE_KEY + '\" ' +
                    '-H \"Authorization: Bearer ' + SUPABASE_KEY + '\" ' +
                    '-H \"Content-Type: image/png\" ' +
                    '--data-binary @\"' + file + '\"',
                    { stdio: 'pipe' }
                  );
                  const publicUrl = SUPABASE_URL + '/storage/v1/object/public/test-artifacts/' + storagePath;
                  urls.push(publicUrl);
                  
                  // Extract spec and test name from original path for mapping
                  const origSpec = parts.length > 1 ? parts[0] : 'unknown';
                  const origFile = path.basename(file, '.png');
                  mapEntries.push({ url: publicUrl, spec: origSpec, file: origFile, original_path: rel });
                  
                  console.log('OK: ' + rel + ' -> ' + storagePath);
                } catch(e) {
                  console.error('FAIL: ' + rel + ' - ' + e.message);
                }
              }
              
              fs.writeFileSync('/tmp/screenshot_urls.json', JSON.stringify(urls));
              fs.writeFileSync('/tmp/screenshot_map.json', JSON.stringify(mapEntries));
              console.log('Screenshots: ' + urls.length + '/' + screenshots.length + ' uploaded');
            "
            
            if [ -f /tmp/screenshot_urls.json ]; then
              SCREENSHOT_URLS=$(cat /tmp/screenshot_urls.json)
            fi
            if [ -f /tmp/screenshot_map.json ]; then
              SCREENSHOT_MAP_JSON=$(cat /tmp/screenshot_map.json)
            fi
          fi
          echo "Screenshot URLs: $SCREENSHOT_URLS"

          # Upload videos with sanitized filenames
          VIDEO_URLS="[]"
          VIDEO_MAP_JSON="[]"
          if [ -d "cypress/videos" ] && [ "$(find cypress/videos -name '*.mp4' 2>/dev/null | wc -l)" -gt 0 ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const { execSync } = require('child_process');
              
              const SUPABASE_URL = process.env.SUPABASE_URL;
              const SUPABASE_KEY = process.env.SUPABASE_KEY;
              const RUN_ID = process.env.RUN_ID;
              
              function sanitize(name) {
                return name
                  .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                  .replace(/[^a-zA-Z0-9._-]/g, '_')
                  .replace(/_+/g, '_')
                  .replace(/^_|_$/g, '')
                  .substring(0, 200);
              }
              
              function findFiles(dir, ext) {
                const results = [];
                if (!fs.existsSync(dir)) return results;
                for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                  const full = path.join(dir, entry.name);
                  if (entry.isDirectory()) results.push(...findFiles(full, ext));
                  else if (entry.name.endsWith(ext)) results.push(full);
                }
                return results;
              }
              
              const videos = findFiles('cypress/videos', '.mp4');
              const urls = [];
              const mapEntries = [];
              
              for (const file of videos) {
                const rel = path.relative('cypress/videos', file);
                const specSlug = sanitize(path.basename(file, '.mp4'));
                const storagePath = 'runs/' + RUN_ID + '/videos/' + specSlug + '.mp4';
                
                try {
                  execSync(
                    'curl -sf -X POST \"' + SUPABASE_URL + '/storage/v1/object/test-artifacts/' + storagePath + '\" ' +
                    '-H \"apikey: ' + SUPABASE_KEY + '\" ' +
                    '-H \"Authorization: Bearer ' + SUPABASE_KEY + '\" ' +
                    '-H \"Content-Type: video/mp4\" ' +
                    '--data-binary @\"' + file + '\"',
                    { stdio: 'pipe' }
                  );
                  const publicUrl = SUPABASE_URL + '/storage/v1/object/public/test-artifacts/' + storagePath;
                  urls.push(publicUrl);
                  mapEntries.push({ url: publicUrl, spec: rel, specSlug });
                  console.log('OK: ' + rel + ' -> ' + storagePath);
                } catch(e) {
                  console.error('FAIL: ' + rel + ' - ' + e.message);
                }
              }
              
              fs.writeFileSync('/tmp/video_urls.json', JSON.stringify(urls));
              fs.writeFileSync('/tmp/video_map.json', JSON.stringify(mapEntries));
              console.log('Videos: ' + urls.length + '/' + videos.length + ' uploaded');
            "
            
            if [ -f /tmp/video_urls.json ]; then
              VIDEO_URLS=$(cat /tmp/video_urls.json)
            fi
            if [ -f /tmp/video_map.json ]; then
              VIDEO_MAP_JSON=$(cat /tmp/video_map.json)
            fi
          fi
          echo "Video URLs: $VIDEO_URLS"

          # 1) Finalize via ingest API
          if [ -n "$INGEST_TOKEN" ]; then
            ESCAPED_ERROR=$(echo "$ERROR_SUMMARY" | sed 's/"/\\"/g' | head -c 900)
            curl -sf -X POST "$INGEST_URL?action=finalize" \
              -H "Content-Type: application/json" \
              -d "{
                \"run_id\": \"$RUN_ID\",
                \"token\": \"$INGEST_TOKEN\",
                \"status\": \"$FINAL_STATUS\",
                \"duration_ms\": $DURATION,
                \"total_tests\": $TOTAL,
                \"passed_tests\": $PASSED,
                \"failed_tests\": $FAILED,
                \"skipped_tests\": $SKIPPED,
                \"error_summary\": \"$ESCAPED_ERROR\"
              }" && echo "Ingest finalize: OK" || echo "Ingest finalize: FAILED"
          fi

          # 2) Build REST payload via Node (avoids shell escaping issues with JSON)
          FINISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          FINAL_STATUS="$FINAL_STATUS" FINISHED_AT="$FINISHED_AT" DURATION="$DURATION" \
          TOTAL="$TOTAL" PASSED="$PASSED" FAILED="$FAILED" SKIPPED="$SKIPPED" \
          SCREENSHOT_URLS="$SCREENSHOT_URLS" VIDEO_URLS="$VIDEO_URLS" \
          GITHUB_RUN_ID="${{ github.run_id }}" \
          GITHUB_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          node -e "
            const fs = require('fs');
            let results = [];
            let errorSummary = null;
            try { results = JSON.parse(fs.readFileSync('/tmp/test_results.json', 'utf8')); } catch(e) {}
            try { errorSummary = fs.readFileSync('/tmp/error_summary.txt', 'utf8') || null; } catch(e) {}
            
            let screenshots = null;
            let videos = null;
            try { const s = JSON.parse(process.env.SCREENSHOT_URLS || '[]'); if (s.length) screenshots = s; } catch(e) {}
            try { const v = JSON.parse(process.env.VIDEO_URLS || '[]'); if (v.length) videos = v; } catch(e) {}
            
            const payload = {
              status: process.env.FINAL_STATUS,
              finished_at: process.env.FINISHED_AT,
              duration_ms: parseInt(process.env.DURATION) || 0,
              total_tests: parseInt(process.env.TOTAL) || 0,
              passed_tests: parseInt(process.env.PASSED) || 0,
              failed_tests: parseInt(process.env.FAILED) || 0,
              skipped_tests: parseInt(process.env.SKIPPED) || 0,
              completed_tests: (parseInt(process.env.PASSED)||0) + (parseInt(process.env.FAILED)||0) + (parseInt(process.env.SKIPPED)||0),
              progress_percent: 100,
              current_spec: null, current_test: null, current_url: null,
              error_message: errorSummary, error_summary: errorSummary,
              results: results,
              screenshot_urls: screenshots, video_urls: videos,
              ingest_token: null,
              github_run_id: process.env.GITHUB_RUN_ID,
              github_run_url: process.env.GITHUB_RUN_URL,
              browser: 'chrome',
              last_event_at: process.env.FINISHED_AT,
            };
            fs.writeFileSync('/tmp/patch_payload.json', JSON.stringify(payload));
            console.log('Payload built: ' + results.length + ' test results, ' + (results.filter(r=>r.status==='failed').length) + ' failures');
          "

          # 3) PATCH via REST with full payload from file
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/test_runs?id=eq.$RUN_ID" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @/tmp/patch_payload.json && echo "REST finalize: OK" || echo "REST finalize: FAILED"

          echo "=== FINALIZATION COMPLETE ==="

      - name: Upload screenshots (GitHub backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ github.event.inputs.test_type }}
          path: cypress/screenshots
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload videos (GitHub backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ github.event.inputs.test_type }}
          path: cypress/videos
          retention-days: 14
          if-no-files-found: ignore
