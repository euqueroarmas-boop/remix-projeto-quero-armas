name: Cypress Tests (Triggered by Admin)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test to run'
        required: true
        type: string
      run_id:
        description: 'test_runs UUID from Supabase'
        required: true
        type: string
      base_url:
        description: 'Base URL to test'
        required: true
        type: string
      supabase_url:
        description: 'Supabase project URL'
        required: true
        type: string
      supabase_key:
        description: 'Supabase service role key'
        required: true
        type: string
      ingest_token:
        description: 'Ephemeral token for event ingestion'
        required: false
        type: string

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ github.event.inputs.supabase_url }}
      SUPABASE_KEY: ${{ github.event.inputs.supabase_key }}
      RUN_ID: ${{ github.event.inputs.run_id }}
      INGEST_TOKEN: ${{ github.event.inputs.ingest_token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare directories
        run: |
          mkdir -p cypress/results cypress/screenshots cypress/videos

      - name: Install dependencies
        run: npm ci

      - name: Map test_type to Cypress spec
        id: specs
        run: |
          case "${{ github.event.inputs.test_type }}" in
            frontend)     SPEC="cypress/e2e/smoke/**" ;;
            business)     SPEC="cypress/e2e/calculo-planos.cy.ts" ;;
            forms)        SPEC="cypress/e2e/formulario-contratacao.cy.ts" ;;
            contracts)    SPEC="cypress/e2e/contratos/**" ;;
            checkout)     SPEC="cypress/e2e/checkout/**" ;;
            portal)       SPEC="cypress/e2e/smoke/home.cy.ts" ;;
            regression)   SPEC="cypress/e2e/**" ;;
            *)            SPEC="cypress/e2e/smoke/**" ;;
          esac
          echo "spec=$SPEC" >> $GITHUB_OUTPUT

      - name: Notify runner online
        run: |
          INGEST_URL="${{ github.event.inputs.supabase_url }}/functions/v1/ingest-test-events"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ -n "${{ github.event.inputs.ingest_token }}" ]; then
            curl -sf -X POST "$INGEST_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"run_id\": \"${{ github.event.inputs.run_id }}\",
                \"token\": \"${{ github.event.inputs.ingest_token }}\",
                \"events\": [{
                  \"event_type\": \"runner_online\",
                  \"status\": \"running\",
                  \"payload\": {
                    \"github_run_id\": \"${{ github.run_id }}\",
                    \"runner\": \"ubuntu-latest\"
                  }
                }]
              }" && echo "Ingest: runner_online sent" || echo "Ingest: runner_online failed (non-fatal)"
          fi

          curl -sf -X PATCH \
            "${{ github.event.inputs.supabase_url }}/rest/v1/test_runs?id=eq.${{ github.event.inputs.run_id }}" \
            -H "apikey: ${{ github.event.inputs.supabase_key }}" \
            -H "Authorization: Bearer ${{ github.event.inputs.supabase_key }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"github_run_id\": \"${{ github.run_id }}\",
              \"github_run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"current_spec\": \"Runner online, instalando dependências...\",
              \"progress_percent\": 5
            }" && echo "REST: runner status updated" || echo "REST: runner status update failed"

      - name: Run Cypress
        id: cypress
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          install: false
          browser: chrome
          headed: false
          spec: ${{ steps.specs.outputs.spec }}
          config: baseUrl=${{ github.event.inputs.base_url }}
          publish-summary: false

      - name: Finalize run from mochawesome report
        if: always()
        run: |
          set +e
          SUPABASE_URL="${{ github.event.inputs.supabase_url }}"
          SUPABASE_KEY="${{ github.event.inputs.supabase_key }}"
          RUN_ID="${{ github.event.inputs.run_id }}"
          INGEST_TOKEN="${{ github.event.inputs.ingest_token }}"
          INGEST_URL="$SUPABASE_URL/functions/v1/ingest-test-events"
          CYPRESS_EXIT="${{ steps.cypress.outcome }}"

          echo "=== FINALIZATION START ==="
          echo "Cypress outcome: $CYPRESS_EXIT"

          # Merge mochawesome reports
          MERGED_REPORT="cypress/results/merged-report.json"
          if ls cypress/results/*.json >/dev/null 2>&1; then
            npx mochawesome-merge "cypress/results/*.json" > "$MERGED_REPORT" 2>/dev/null
            echo "Mochawesome reports merged"
          else
            echo '{"stats":{"tests":0,"passes":0,"failures":0,"pending":0,"duration":0},"results":[]}' > "$MERGED_REPORT"
            echo "No mochawesome reports found, using empty"
          fi

          # Parse stats from merged report
          TOTAL=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.tests||0)" 2>/dev/null || echo "0")
          PASSED=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.passes||0)" 2>/dev/null || echo "0")
          FAILED=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.failures||0)" 2>/dev/null || echo "0")
          SKIPPED=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.pending||0)" 2>/dev/null || echo "0")
          DURATION=$(node -e "const r=require('./$MERGED_REPORT'); console.log(r.stats?.duration||0)" 2>/dev/null || echo "0")

          echo "Stats: total=$TOTAL passed=$PASSED failed=$FAILED skipped=$SKIPPED duration=${DURATION}ms"

          # Determine final status
          if [ "$FAILED" -gt 0 ] 2>/dev/null; then
            FINAL_STATUS="failed"
          elif [ "$CYPRESS_EXIT" = "failure" ]; then
            FINAL_STATUS="failed"
            [ "$TOTAL" -eq 0 ] && FAILED=1 && TOTAL=1
          else
            FINAL_STATUS="success"
          fi

          # Extract error summary AND per-test results from mochawesome
          ERROR_SUMMARY=""
          TEST_RESULTS_JSON="[]"
          
          node -e "
            const fs = require('fs');
            const r = require('./$MERGED_REPORT');
            const errors = [];
            const results = [];
            
            (r.results || []).forEach(specFile => {
              const specName = specFile.file || specFile.fullFile || 'unknown';
              
              function walkSuites(suites, parentTitle) {
                (suites || []).forEach(suite => {
                  const suiteTitle = parentTitle ? parentTitle + ' > ' + suite.title : suite.title;
                  
                  (suite.tests || []).forEach(test => {
                    const entry = {
                      name: test.title || 'unnamed',
                      fullTitle: test.fullTitle || suiteTitle + ' > ' + test.title,
                      spec: specName,
                      status: test.pass ? 'passed' : test.fail ? 'failed' : 'skipped',
                      duration_ms: test.duration || 0,
                      url: test.context ? (typeof test.context === 'string' ? test.context : null) : null,
                    };
                    
                    if (test.fail && test.err) {
                      entry.error = (test.err.message || '').substring(0, 2000);
                      entry.stack_trace = (test.err.estack || test.err.stack || '').substring(0, 3000);
                      if (test.err.expected !== undefined || test.err.actual !== undefined) {
                        entry.diff = {
                          expected: test.err.expected,
                          actual: test.err.actual
                        };
                      }
                      errors.push(test.fullTitle + ': ' + (test.err.message || '').substring(0, 200));
                    }
                    
                    results.push(entry);
                  });
                  
                  // Recurse nested suites
                  walkSuites(suite.suites, suiteTitle);
                });
              }
              
              walkSuites(specFile.suites, '');
            });
            
            const errorSummary = errors.join(' | ').substring(0, 1000) || (r.stats?.failures > 0 ? r.stats.failures + ' test(s) failed' : '');
            
            fs.writeFileSync('/tmp/test_results.json', JSON.stringify(results));
            fs.writeFileSync('/tmp/error_summary.txt', errorSummary);
          " 2>/dev/null
          
          if [ -f /tmp/error_summary.txt ]; then
            ERROR_SUMMARY=$(cat /tmp/error_summary.txt)
          fi
          if [ -f /tmp/test_results.json ]; then
            TEST_RESULTS_JSON=$(cat /tmp/test_results.json)
          fi
          [ -z "$ERROR_SUMMARY" ] && [ "$FAILED" -gt 0 ] && ERROR_SUMMARY="$FAILED test(s) failed"

          echo "Final status: $FINAL_STATUS"
          echo "Error summary: $ERROR_SUMMARY"

          # Upload screenshots
          SCREENSHOT_URLS="[]"
          if [ -d "cypress/screenshots" ] && [ "$(find cypress/screenshots -name '*.png' 2>/dev/null | wc -l)" -gt 0 ]; then
            URLS=""
            find cypress/screenshots -name "*.png" | while read -r file; do
              REL="${file#cypress/screenshots/}"
              SPATH="runs/$RUN_ID/screenshots/$REL"
              curl -sf -X POST \
                "$SUPABASE_URL/storage/v1/object/test-artifacts/$SPATH" \
                -H "apikey: $SUPABASE_KEY" \
                -H "Authorization: Bearer $SUPABASE_KEY" \
                -H "Content-Type: image/png" \
                --data-binary "@$file" > /dev/null && echo "Uploaded: $REL" || echo "Failed: $REL"
            done
            SCREENSHOT_URLS=$(find cypress/screenshots -name "*.png" | while read -r file; do
              REL="${file#cypress/screenshots/}"
              echo "\"$SUPABASE_URL/storage/v1/object/public/test-artifacts/runs/$RUN_ID/screenshots/$REL\""
            done | paste -sd, | sed 's/^/[/' | sed 's/$/]/')
            [ -z "$SCREENSHOT_URLS" ] && SCREENSHOT_URLS="[]"
          fi

          # Upload videos
          VIDEO_URLS="[]"
          if [ -d "cypress/videos" ] && [ "$(find cypress/videos -name '*.mp4' 2>/dev/null | wc -l)" -gt 0 ]; then
            find cypress/videos -name "*.mp4" | while read -r file; do
              REL="${file#cypress/videos/}"
              SPATH="runs/$RUN_ID/videos/$REL"
              curl -sf -X POST \
                "$SUPABASE_URL/storage/v1/object/test-artifacts/$SPATH" \
                -H "apikey: $SUPABASE_KEY" \
                -H "Authorization: Bearer $SUPABASE_KEY" \
                -H "Content-Type: video/mp4" \
                --data-binary "@$file" > /dev/null && echo "Uploaded video: $REL" || echo "Failed video: $REL"
            done
            VIDEO_URLS=$(find cypress/videos -name "*.mp4" | while read -r file; do
              REL="${file#cypress/videos/}"
              echo "\"$SUPABASE_URL/storage/v1/object/public/test-artifacts/runs/$RUN_ID/videos/$REL\""
            done | paste -sd, | sed 's/^/[/' | sed 's/$/]/')
            [ -z "$VIDEO_URLS" ] && VIDEO_URLS="[]"
          fi

          # 1) Finalize via ingest API
          if [ -n "$INGEST_TOKEN" ]; then
            ESCAPED_ERROR=$(echo "$ERROR_SUMMARY" | sed 's/"/\\"/g' | head -c 900)
            curl -sf -X POST "$INGEST_URL?action=finalize" \
              -H "Content-Type: application/json" \
              -d "{
                \"run_id\": \"$RUN_ID\",
                \"token\": \"$INGEST_TOKEN\",
                \"status\": \"$FINAL_STATUS\",
                \"duration_ms\": $DURATION,
                \"total_tests\": $TOTAL,
                \"passed_tests\": $PASSED,
                \"failed_tests\": $FAILED,
                \"skipped_tests\": $SKIPPED,
                \"error_summary\": \"$ESCAPED_ERROR\"
              }" && echo "Ingest finalize: OK" || echo "Ingest finalize: FAILED"
          fi

          # 2) Direct REST PATCH with full results (definitive fallback)
          FINISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          # Build payload via Node to avoid shell escaping issues
          node -e "
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('/tmp/test_results.json', 'utf8') || '[]');
            const errorSummary = fs.readFileSync('/tmp/error_summary.txt', 'utf8') || null;
            const screenshotUrls = JSON.parse(process.env.SCREENSHOT_URLS || '[]');
            const videoUrls = JSON.parse(process.env.VIDEO_URLS || '[]');
            
            const payload = {
              status: process.env.FINAL_STATUS,
              finished_at: process.env.FINISHED_AT,
              duration_ms: parseInt(process.env.DURATION) || 0,
              total_tests: parseInt(process.env.TOTAL) || 0,
              passed_tests: parseInt(process.env.PASSED) || 0,
              failed_tests: parseInt(process.env.FAILED) || 0,
              skipped_tests: parseInt(process.env.SKIPPED) || 0,
              completed_tests: (parseInt(process.env.PASSED) || 0) + (parseInt(process.env.FAILED) || 0) + (parseInt(process.env.SKIPPED) || 0),
              progress_percent: 100,
              current_spec: null,
              current_test: null,
              current_url: null,
              error_message: errorSummary || null,
              error_summary: errorSummary || null,
              results: results,
              screenshot_urls: screenshotUrls.length > 0 ? screenshotUrls : null,
              video_urls: videoUrls.length > 0 ? videoUrls : null,
              ingest_token: null,
              github_run_id: process.env.GITHUB_RUN_ID,
              github_run_url: process.env.GITHUB_RUN_URL,
              browser: 'chrome',
              last_event_at: process.env.FINISHED_AT,
            };
            
            fs.writeFileSync('/tmp/patch_payload.json', JSON.stringify(payload));
          " 2>/dev/null
          
          FINAL_STATUS="$FINAL_STATUS" FINISHED_AT="$FINISHED_AT" DURATION="$DURATION" \
          TOTAL="$TOTAL" PASSED="$PASSED" FAILED="$FAILED" SKIPPED="$SKIPPED" \
          SCREENSHOT_URLS="$SCREENSHOT_URLS" VIDEO_URLS="$VIDEO_URLS" \
          GITHUB_RUN_ID="${{ github.run_id }}" \
          GITHUB_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          node -e "
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('/tmp/test_results.json', 'utf8') || '[]');
            const errorSummary = fs.readFileSync('/tmp/error_summary.txt', 'utf8') || null;
            
            const payload = {
              status: process.env.FINAL_STATUS,
              finished_at: process.env.FINISHED_AT,
              duration_ms: parseInt(process.env.DURATION) || 0,
              total_tests: parseInt(process.env.TOTAL) || 0,
              passed_tests: parseInt(process.env.PASSED) || 0,
              failed_tests: parseInt(process.env.FAILED) || 0,
              skipped_tests: parseInt(process.env.SKIPPED) || 0,
              completed_tests: (parseInt(process.env.PASSED)||0) + (parseInt(process.env.FAILED)||0) + (parseInt(process.env.SKIPPED)||0),
              progress_percent: 100,
              current_spec: null, current_test: null, current_url: null,
              error_message: errorSummary || null,
              error_summary: errorSummary || null,
              results: results,
              screenshot_urls: process.env.SCREENSHOT_URLS !== '[]' ? JSON.parse(process.env.SCREENSHOT_URLS) : null,
              video_urls: process.env.VIDEO_URLS !== '[]' ? JSON.parse(process.env.VIDEO_URLS) : null,
              ingest_token: null,
              github_run_id: process.env.GITHUB_RUN_ID,
              github_run_url: process.env.GITHUB_RUN_URL,
              browser: 'chrome',
              last_event_at: process.env.FINISHED_AT,
            };
            fs.writeFileSync('/tmp/patch_payload.json', JSON.stringify(payload));
          "

          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/test_runs?id=eq.$RUN_ID" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @/tmp/patch_payload.json && echo "REST finalize: OK" || echo "REST finalize: FAILED"

          echo "=== FINALIZATION COMPLETE ==="

      - name: Upload screenshots (GitHub backup)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ github.event.inputs.test_type }}
          path: cypress/screenshots
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload videos (GitHub backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ github.event.inputs.test_type }}
          path: cypress/videos
          retention-days: 14
          if-no-files-found: ignore
