name: Playwright Audit (Quero Armas)

# Roda a auditoria humana do Quero Armas em ambiente com todas as libs
# nativas do Chromium pré-instaladas (container oficial do Playwright).
#
# Use workflow_dispatch para validar manualmente o Bloco 2 (Serviços) e
# pull_request para barrar regressões na jornada pública.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: Playwright audit (routes + journey)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Container oficial do Playwright, FIXADO na mesma versão do
    # @playwright/test do package.json (1.58.2). Ao atualizar a dep,
    # atualize também esta tag para manter client e browsers em sync.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    env:
      CI: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Audit — routes
        run: npm run audit:routes

      - name: Audit — journey
        if: always()
        run: npm run audit:journey

      - name: Upload audit report (quero-armas)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quero-armas-audit-report
          path: test-results/quero-armas-audit/**
          if-no-files-found: warn

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html
          path: test-results/playwright-html/**
          if-no-files-found: warn

      - name: Upload Playwright artifacts (traces/screenshots/videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/playwright-artifacts/**
          if-no-files-found: warn

      - name: Upload Playwright JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-json
          path: test-results/playwright-report.json
          if-no-files-found: warn